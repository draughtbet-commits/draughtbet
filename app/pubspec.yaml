name: draughts_arena
description: A real-money, skill-based mobile gaming platform centered around International Draughts.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  dio: ^5.4.3+1
  socket_io_client: ^2.0.3+1
  flutter_secure_storage: ^9.0.0
  go_router: ^14.0.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  webview_flutter: ^4.7.0
  firebase_messaging: ^14.7.19
  firebase_core: ^2.24.2
  flutter_dotenv: ^5.1.0
  device_info_plus: ^10.1.0
  package_info_plus: ^8.0.0
  connectivity_plus: ^6.0.3
  intl: ^0.19.0
  google_fonts: ^6.2.1
  lucide_icons: ^1.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^8.0.0
  mocktail: ^1.0.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env
